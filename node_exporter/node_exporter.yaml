---
apiVersion: v1
kind: Pod
metadata:
  name: node-exporter
  labels:
    app: node-exporter
spec:
  hostNetwork: true
  hostPID: true
  restartPolicy: Always
  containers:
    - name: node-exporter
      image: quay.io/prometheus/node-exporter:v1.10.2
      args:
        - "--path.rootfs=/host"
      securityContext:
        privileged: true
      volumeMounts:
        - name: rootfs
          mountPath: /host
          readOnly: true
  volumes:
    - name: rootfs
      hostPath:
        path: /
        type: Directory
