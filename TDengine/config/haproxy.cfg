#    server node2 tdengine-node2:6030 check inter 10s fall 5 rise 5 backup
#    server node3 tdengine-node3:6030 check inter 10s fall 5 rise 5 backup

# RESTful API 負載均衡
frontend restful_frontend
    bind *:6041
    default_backend restful_backend

backend restful_backend
    balance roundrobin
    option tcp-check
    tcp-check connect
    server node1 tdengine-node1:6041 check inter 10s fall 5 rise 5
    server node2 tdengine-node2:6041 check inter 10s fall 5 rise 5 backup
    server node3 tdengine-node3:6041 check inter 10s fall 5 rise 5 backup

# 統計頁面
frontend stats
    mode http
    bind *:8404
    stats auth admin:admin
    stats enable
    stats refresh 30s
    stats uri /stats
    stats show-modules
